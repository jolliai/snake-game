<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 388" width="1240" height="388" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="How Jolli Memory works: commits are distilled by hooks into summaries stored on an orphan branch, which produce a knowledge wiki and a knowledge graph you can recall and search.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6E7681"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="1224" height="372" rx="16" fill="#0D1117" stroke="#30363D" stroke-width="1.5"/>

  <!-- title -->
  <rect x="40" y="34" width="6" height="28" rx="2" fill="#E3B341"/>
  <text x="60" y="56" font-size="27" font-weight="700" fill="#E6EDF3">How Jolli Memory works</text>
  <text x="60" y="82" font-size="15" fill="#8B949E">Every commit becomes durable, structured memory — automatically, with no manual note-taking.</text>

  <!-- Stage 1: Commit -->
  <rect x="40" y="116" width="250" height="150" rx="12" fill="#161B22" stroke="#30363D"/>
  <circle cx="80" cy="154" r="15" fill="#E3B34122" stroke="#E3B341"/>
  <text x="80" y="159" font-size="15" font-weight="700" fill="#E3B341" text-anchor="middle">1</text>
  <text x="108" y="160" font-size="18" font-weight="700" fill="#E6EDF3">Commit</text>
  <text x="64" y="196" font-size="13.5" fill="#8B949E">You and your AI agent</text>
  <text x="64" y="218" font-size="13.5" fill="#8B949E">write and commit code.</text>

  <!-- Stage 2: Distill -->
  <rect x="330" y="116" width="250" height="150" rx="12" fill="#161B22" stroke="#30363D"/>
  <circle cx="370" cy="154" r="15" fill="#58A6FF22" stroke="#58A6FF"/>
  <text x="370" y="159" font-size="15" font-weight="700" fill="#58A6FF" text-anchor="middle">2</text>
  <text x="398" y="160" font-size="18" font-weight="700" fill="#E6EDF3">Distill</text>
  <text x="354" y="196" font-size="13.5" fill="#8B949E">Git + agent hooks turn each</text>
  <text x="354" y="218" font-size="13.5" fill="#8B949E">commit into a summary —</text>
  <text x="354" y="240" font-size="13.5" fill="#8B949E">intent, decisions, files.</text>

  <!-- Stage 3: Store -->
  <rect x="620" y="116" width="250" height="150" rx="12" fill="#161B22" stroke="#30363D"/>
  <circle cx="660" cy="154" r="15" fill="#3FB95022" stroke="#3FB950"/>
  <text x="660" y="159" font-size="15" font-weight="700" fill="#3FB950" text-anchor="middle">3</text>
  <text x="688" y="160" font-size="18" font-weight="700" fill="#E6EDF3">Store</text>
  <text x="644" y="196" font-size="13.5" fill="#8B949E">Saved on the orphan branch</text>
  <text x="644" y="218" font-size="12.5" fill="#768390" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">jollimemory/summaries/v3</text>
  <text x="644" y="240" font-size="13.5" fill="#8B949E">+ your Memory Bank folder.</text>

  <!-- Output: Wiki -->
  <rect x="916" y="116" width="284" height="70" rx="12" fill="#161B22" stroke="#30363D"/>
  <rect x="940" y="143" width="12" height="12" rx="3" fill="#BC8CFF"/>
  <text x="966" y="148" font-size="17" font-weight="700" fill="#E6EDF3">Knowledge Wiki</text>
  <text x="966" y="170" font-size="13" fill="#8B949E">Browsable topic pages</text>

  <!-- Output: Graph -->
  <rect x="916" y="196" width="284" height="70" rx="12" fill="#161B22" stroke="#30363D"/>
  <rect x="940" y="223" width="12" height="12" rx="3" fill="#F0883E"/>
  <text x="966" y="228" font-size="17" font-weight="700" fill="#E6EDF3">Knowledge Graph</text>
  <text x="966" y="250" font-size="13" fill="#8B949E">Interactive map of topics &amp; links</text>

  <!-- connectors -->
  <line x1="298" y1="191" x2="322" y2="191" stroke="#6E7681" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="588" y1="191" x2="612" y2="191" stroke="#6E7681" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M878,191 H898" fill="none" stroke="#6E7681" stroke-width="2"/>
  <path d="M898,191 C907,191 907,151 913,151" fill="none" stroke="#6E7681" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M898,191 C907,191 907,231 913,231" fill="none" stroke="#6E7681" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- footer bar -->
  <rect x="40" y="292" width="1160" height="66" rx="12" fill="#12171F" stroke="#21262D"/>
  <rect x="40" y="292" width="6" height="66" rx="3" fill="#E3B341"/>
  <text x="70" y="322" font-size="16" font-weight="700" fill="#E6EDF3">Recall &amp; search it anytime, across branches and machines</text>
  <text x="70" y="344" font-size="13" fill="#8B949E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">jolli recall  ·  jolli search  ·  or the Jolli Memory panel in VS Code</text>
</svg>
